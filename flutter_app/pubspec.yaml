name: karryt_flutter
version: 1.0.1+2
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  socket_io_client: ^3.1.2
  geolocator: ^12.0.0
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.1.0
  uuid: ^4.0.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  permission_handler: ^11.3.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1A56DB"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/karryt.png

