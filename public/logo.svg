<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .karrit-text { font-family: Arial, sans-serif; font-size: 36px; font-weight: bold; }
      .karrit-navy { fill: #003d7a; }
      .karrit-orange { fill: #ff6d00; }
    </style>
  </defs>
  
  <!-- Motion lines (left side) -->
  <line x1="10" y1="40" x2="25" y2="40" stroke="#ff6d00" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="50" x2="25" y2="50" stroke="#ff6d00" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="60" x2="25" y2="60" stroke="#ff6d00" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Truck body container -->
  <rect x="30" y="35" width="110" height="50" rx="6" ry="6" fill="none" stroke="#003d7a" stroke-width="4"/>
  
  <!-- Truck cabin (right side) -->
  <rect x="140" y="35" width="35" height="50" rx="4" ry="4" fill="#ff6d00"/>
  
  <!-- Truck wheels -->
  <circle cx="50" cy="90" r="6" fill="none" stroke="#003d7a" stroke-width="2.5"/>
  <circle cx="50" cy="90" r="3.5" fill="#003d7a"/>
  <circle cx="110" cy="90" r="6" fill="none" stroke="#003d7a" stroke-width="2.5"/>
  <circle cx="110" cy="90" r="3.5" fill="#003d7a"/>
  <circle cx="160" cy="90" r="6" fill="none" stroke="#003d7a" stroke-width="2.5"/>
  <circle cx="160" cy="90" r="3.5" fill="#003d7a"/>
  
  <!-- Text "KARRIT" -->
  <text x="195" y="68" class="karrit-text karrit-navy">KARRIT</text>
</svg>